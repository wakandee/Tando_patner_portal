<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "TANDO Partner Portal" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  </head>
  <body>
    {% block body %}{% endblock %}
    <script>
      document.addEventListener("click", (event) => {
        const opener = event.target.closest("[data-dialog-open]");
        if (opener) {
          const dialog = document.getElementById(opener.dataset.dialogOpen);
          if (dialog && dialog.showModal) dialog.showModal();
        }

        const closer = event.target.closest("[data-dialog-close]");
        if (closer) {
          const dialog = closer.closest("dialog");
          if (dialog && dialog.close) dialog.close();
        }

        const accountToggle = event.target.closest("[data-account-toggle]");
        const accountMenu = document.querySelector("[data-account-menu]");
        if (accountToggle && accountMenu) {
          accountMenu.classList.toggle("is-open");
          return;
        }
        if (accountMenu && !event.target.closest("[data-account-menu]")) {
          accountMenu.classList.remove("is-open");
        }

        const notificationToggle = event.target.closest("[data-notification-toggle]");
        const notificationMenu = document.querySelector("[data-notification-menu]");
        if (notificationToggle && notificationMenu) {
          notificationMenu.classList.toggle("is-open");
          return;
        }
        if (notificationMenu && !event.target.closest("[data-notification-menu]")) {
          notificationMenu.classList.remove("is-open");
        }
      });

      window.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".flash").forEach((toast, index) => {
          toast.style.zIndex = String(1200 - index);
          window.setTimeout(() => {
            toast.classList.add("is-exiting");
            window.setTimeout(() => toast.remove(), 240);
          }, 3200 + (index * 180));
        });

        document.querySelectorAll("[data-password-min]").forEach((input) => {
          const min = Number(input.dataset.passwordMin || 6);
          input.setAttribute("minlength", String(min));
        });
      });
    </script>
  </body>
</html>
